# .github/workflows/pull-request.yml
name: Pull-Request
permissions: {}
on:
  pull_request:
    branches: ['**']

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/build.yml
    with:
      run_e2e: true
